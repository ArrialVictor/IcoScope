name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install (test deps only, no Qt)
        run: |
          python -m pip install --upgrade pip
          # numpy + netCDF4 + pytest are enough for the grid + loader test suites.
          # Qt/PyVista deps are intentionally skipped — those need a display.
          # Pillow is used by export.py for the composite-tile helper; it's
          # tiny and headless, fine to install in the no-Qt test job.
          python -m pip install numpy netCDF4 pytest Pillow
          python -m pip install --no-deps -e .

      - name: Run tests
        run: pytest -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ tools/

  policy:
    name: Content policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run policy check
        env:
          FORBIDDEN_PATTERNS: ${{ secrets.FORBIDDEN_PATTERNS }}
        run: |
          # Pattern list comes from the repo secret. If the secret is not set,
          # the check is skipped — keeps the workflow valid for forks/clones.
          if [ -z "$FORBIDDEN_PATTERNS" ]; then
            echo "FORBIDDEN_PATTERNS secret not configured; skipping check."
            exit 0
          fi
          # -q suppresses match output so no specifics leak to the CI log.
          if grep -rEiq "$FORBIDDEN_PATTERNS" \
               --include="*.py" --include="*.md" --include="*.toml" \
               --include="*.yml" --include="*.txt" \
               . ; then
            echo "Policy violation found in repository content." >&2
            echo "(Review locally before retrying the push.)" >&2
            exit 1
          fi
          echo "Policy check passed."
